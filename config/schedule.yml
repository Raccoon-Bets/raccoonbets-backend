# sidekiq-cron schedules, loaded on Sidekiq server startup. Times are UTC.
#
# Closing-soon notices are scheduled per market at lock time (see
# Market#schedule_closing_soon_notification). This daily sweep is only a safety
# net that re-enqueues any per-market job lost from the queue.
closing_soon_sweep:
  cron: "0 8 * * *"
  class: Notifications::ClosingSoonSweepJob
  queue: default
