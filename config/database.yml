default: &default
  adapter: postgresql
  encoding: unicode
  # Cover Puma's threads plus the embedded Sidekiq workers (concurrency 2).
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 3 }.to_i + 2 %>
  owner: raccoonbets
  username: raccoonbets

development:
  <<: *default
  database: raccoonbets_development

test: &test
  <<: *default
  host: localhost
  username: <%= ENV.fetch('POSTGRES_USER') { 'tmorgan' } %>
  password: <%= ENV.fetch('POSTGRES_PASSWORD') { '' } %>
  database: <%= ENV.fetch('POSTGRES_DB') { 'raccoonbets_test' } %>

cypress: *test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
  database: raccoonbets_production
  connect_timeout: 5
  checkout_timeout: 10
  idle_timeout: 300
  reaping_frequency: 30
  # Detect stale TCP connections quickly after Fly machine resume.
  # Without these, a frozen socket can hang for 15+ minutes.
  keepalives: 1
  keepalives_idle: 5
  keepalives_interval: 5
  keepalives_count: 2
